<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Lunchbox</title>
    <link rel="stylesheet" href="developerlunchbox.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-containers">
        
    </div>
    <div id="div1">
        <h1 class="dancing-script-uniquifier">Nathi Tshabalala</h1>
        <h3 class="dancing-script-uniquifier">Developers Lunchbox</h3>
        <button id="view" class="dancing-script-uniquifier">View</button>
    </div>

    <div id="container" class="dancing-script-uniquifier">
        
        <h1>Dice Roller🎲</h1>
        <label id="label1"># of dice</label>
        <input type="number" id="numOfDice" value="1" min="1">
        <br>
        <br>
        <button onclick="rolldice()" id="rolldice" class="dancing-script-uniquifier"
        >Roll Dice</button>
        <div id="diceResult"></div>
        <div id="diceImages"></div>
    </div>

    <div id="container2" >
        <form id="form1">
            <br>
            
            <label id="label2" class="dancing-script-uniquifier">Generate Random Password</label>

        </form>
       
        <button id="generateBtn" class="dancing-script-uniquifier">Generate</button>
        <br>
        <br>
        <br>
        <p1 id="p1"></p1>
        
       
    </div>

    <div id="container3" class="dancing-script-uniquifier">
        <h2>Currency Conversion</h2>
        <label class="label3">💷💵💶💴</label>
        <br>
        <br>
        
        <label class="label3" for="currencypair">Currency Pair</label>
        
        <br>
        <select id="currencypair">
            <option value="ZAR/GBP" class="options">ZAR/GBP</option>
            <option value="ZAR/USD" class="options">ZAR/USD</option>
            <option value="ZAR/EUR" class="options">ZAR/EUR</option>
            <option value="ZAR/JPY" class="options">ZAR/JPY</option>

        </select>
        <br>
        
        <br>
        <label class="label3">Enter Amount: ZAR</label> <br>
        <input type="number" id="currencyinput">
        <br>
        <br>
        <button id="submit" class="dancing-script-uniquifier">Submit</button>
        <p id="p3" ></p>

    </div>
    <div id="taskManagerContainer" class="dancing-script-uniquifier">
     <div id="taskDiv">
        <h1 id="taskManager">Task Manager</h1>
        <input id="user-task" placeholder="Enter new task">
        <button id="add">Add</button>
        <button id="filter">Filter</button>
        <br>
         <button id="showTable">Show All</button>
           
        <br>
        <br>
        <table id="table1" >  
        <tbody>
        </tbody>
        </table>    
        
        <br>
        <br>
        
    </div>
    </div>



    
    
    <script src="developerlunchbox.js"></script>
</body>
</html>
